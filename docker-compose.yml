services:
  postgres:
    image: postgres:16
    container_name: cloudwatchdog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudwatchdog
      POSTGRES_PASSWORD: cloudwatchdog
      POSTGRES_DB: cloudwatchdog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudwatchdog -d cloudwatchdog"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
